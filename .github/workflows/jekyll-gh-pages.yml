# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # NEW STEP: Loops over your IDs, calls Windy API, and populates data for Jekyll
      - name: Fetch All Windy Webcams Data
        env:
          WINDY_API_KEY: ${{ secrets.WINDY_API_KEY }}
        run: |
          mkdir -p _data/fetched_cams
          
          # Read the list of IDs from your YAML config file and loop through them
          # Using standard grep/sed to extract raw IDs reliably without extra npm packages
          grep -oP 'id:\s*"\K[^"]+' _data/webcams_list.yml | while read -r cam_id; do
            echo "Fetching data for webcam ID: $cam_id"
            
            # Call the Windy Webcams API (v3 requires 'x-windy-api-key' header)
            curl -s -X GET \
              -H "x-windy-api-key: $WINDY_API_KEY" \
              "https://windy.com" \
              -o "_data/fetched_cams/cam_${cam_id}.json"
          done
        
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
